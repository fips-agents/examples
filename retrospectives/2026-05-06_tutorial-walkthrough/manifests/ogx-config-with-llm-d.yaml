# OGX ogx-config ConfigMap with llm-d added as a third inference provider.
# This is what we apply for the Module 11 integration validation.
#
# Diff vs current state:
#   - Adds providers.inference[2] (provider_id: llm-d) pointing at the
#     quickstart-epp service in llm-d-quickstart (port 80).
#   - Adds registered_resources.models[2] for Qwen3-0.6B under that provider.
#
# Apply:
#   oc --context=kagenti-memory-hub -n ogx apply -f ogx-config-with-llm-d.yaml
#   oc --context=kagenti-memory-hub -n ogx rollout restart deploy ogx
apiVersion: v1
kind: ConfigMap
metadata:
  name: ogx-config
  namespace: ogx
data:
  config.yaml: |
    version: 2
    image_name: tutorial
    apis:
      - inference
      - safety
      - tool_runtime
    providers:
      inference:
        - provider_id: vllm
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_URL:=}
            max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
            api_token: ${env.VLLM_API_TOKEN:=fake}
        - provider_id: vllm-guard
          provider_type: remote::vllm
          config:
            base_url: http://llama-guard-predictor.llama-guard-model.svc.cluster.local:8000/v1
            max_tokens: 128
            api_token: fake
        - provider_id: llm-d
          provider_type: remote::vllm
          config:
            base_url: http://quickstart-epp.llm-d-quickstart.svc.cluster.local/v1
            max_tokens: 512
            api_token: fake
      safety:
        - provider_id: code-scanner
          provider_type: inline::code-scanner
          config: {}
        - provider_id: llama-guard
          provider_type: inline::llama-guard
          config: {}
    registered_resources:
      models:
        - model_id: ${env.VLLM_INFERENCE_MODEL}
          provider_id: vllm
          model_type: llm
        - model_id: RedHatAI/Llama-Guard-4-12B-quantized.w8a8
          provider_id: vllm-guard
          model_type: llm
        - model_id: Qwen/Qwen3-0.6B
          provider_id: llm-d
          model_type: llm
      shields:
        - shield_id: code-scanner
          provider_id: code-scanner
        - shield_id: llama-guard
          provider_id: llama-guard
          provider_shield_id: vllm-guard/RedHatAI/Llama-Guard-4-12B-quantized.w8a8
      tool_groups: []
    server:
      port: 8321
